<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LATENCY - Choose Your Destiny</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/reset.css?v=24">
    <link rel="stylesheet" href="css/variables.css?v=24">
    <link rel="stylesheet" href="css/base.css?v=24">
    <link rel="stylesheet" href="css/layout.css?v=24">
    <link rel="stylesheet" href="css/menu.css?v=24">
    <link rel="stylesheet" href="css/creation.css?v=24">
    <link rel="stylesheet" href="css/gameplay.css?v=24">
    <link rel="stylesheet" href="css/combat.css?v=24">
    <link rel="stylesheet" href="css/inventory.css?v=24">
    <link rel="stylesheet" href="css/achievements.css?v=24">
    <link rel="stylesheet" href="css/map.css?v=24">
    <link rel="stylesheet" href="css/cutscene.css?v=24">
    <link rel="stylesheet" href="css/settings.css?v=24">
    <link rel="stylesheet" href="css/ending.css?v=24">
    <link rel="stylesheet" href="css/howtoplay.css?v=24">
    <link rel="stylesheet" href="css/loading.css?v=24">
    <link rel="stylesheet" href="css/journal.css?v=24">
    <link rel="stylesheet" href="css/tooltip.css?v=24">
</head>
<body>
    <!-- Music layer: NEVER modified by screen transitions -->
    <div id="music-layer">
        <audio id="music-player" preload="auto"></audio>
    </div>

    <!-- Particle overlay: persists across screens -->
    <canvas id="particle-canvas"></canvas>

    <!-- Screen container: ONLY thing screens touch -->
    <div id="screen-container"></div>

    <!-- Persistent music controls: NEVER touched by screen transitions -->
    <div id="music-controls">
        <button id="music-mute-btn" title="Toggle Mute">🔊</button>
        <button id="music-vol-down" title="Volume Down">−</button>
        <button id="music-vol-up" title="Volume Up">+</button>
        <button id="voice-toggle-btn" title="Toggle Voice">&#x1f50a;V</button>
        <button id="sfx-toggle-btn" title="Toggle SFX">&#x1f50a;FX</button>
        <span id="music-track-name"></span>
    </div>

    <!-- Notification toasts -->
    <div id="notification-layer"></div>

    <!-- Scripts in dependency order -->

    <!-- Engine (no dependencies except EventBus) -->
    <script src="js/engine/event-bus.js?v=24"></script>
    <script src="js/engine/dice.js?v=24"></script>
    <script src="js/engine/state-machine.js?v=24"></script>
    <script src="js/engine/music-manager.js?v=24"></script>
    <script src="js/engine/voice-manager.js?v=24"></script>
    <script src="js/engine/sfx-manager.js?v=24"></script>
    <script src="js/engine/screen-manager.js?v=24"></script>
    <script src="js/engine/save-manager.js?v=24"></script>
    <script src="js/engine/asset-loader.js?v=24"></script>
    <script src="js/engine/particles.js?v=24"></script>

    <!-- Data (no dependencies) -->
    <script src="js/data/races.js?v=24"></script>
    <script src="js/data/traits.js?v=24"></script>
    <script src="js/data/items.js?v=24"></script>
    <script src="js/data/enemies.js?v=24"></script>
    <script src="js/data/factions.js?v=24"></script>
    <script src="js/data/skills.js?v=24"></script>
    <script src="js/data/buffs.js?v=24"></script>
    <script src="js/data/jobs.js?v=24"></script>
    <script src="js/data/locations.js?v=24"></script>
    <script src="js/data/npcs.js?v=24"></script>
    <script src="js/data/achievements.js?v=24"></script>
    <script src="js/data/side-quests.js?v=24"></script>
    <script src="js/data/cutscenes-origins-1.js?v=24"></script>
    <script src="js/data/cutscenes-origins-2.js?v=24"></script>
    <script src="js/data/random-events.js?v=24"></script>

    <!-- Systems (depend on engine + data) -->
    <script src="js/systems/condition-eval.js?v=24"></script>
    <script src="js/systems/character.js?v=24"></script>
    <script src="js/systems/narrative.js?v=24"></script>
    <script src="js/systems/inventory.js?v=24"></script>
    <script src="js/systems/combat.js?v=24"></script>
    <script src="js/systems/skills.js?v=24"></script>
    <script src="js/systems/buffs.js?v=24"></script>
    <script src="js/systems/faction.js?v=24"></script>
    <script src="js/systems/job.js?v=24"></script>
    <script src="js/systems/economy.js?v=24"></script>
    <script src="js/systems/npc.js?v=24"></script>
    <script src="js/systems/achievements.js?v=24"></script>
    <script src="js/systems/journal.js?v=24"></script>
    <script src="js/systems/encounters.js?v=24"></script>
    <script src="js/systems/newgameplus.js?v=24"></script>

    <!-- UI Components -->
    <script src="js/ui/typewriter.js?v=24"></script>
    <script src="js/ui/ascii-renderer.js?v=24"></script>
    <script src="js/ui/dice-animator.js?v=24"></script>
    <script src="js/ui/notification.js?v=24"></script>
    <script src="js/ui/tooltip.js?v=24"></script>
    <script src="js/ui/cinematic-renderer.js?v=24"></script>

    <!-- Screens -->
    <script src="js/screens/main-menu.js?v=24"></script>
    <script src="js/screens/character-creation.js?v=24"></script>
    <script src="js/screens/gameplay.js?v=24"></script>
    <script src="js/screens/save-load-screen.js?v=24"></script>
    <script src="js/screens/combat-screen.js?v=24"></script>
    <script src="js/screens/inventory-screen.js?v=24"></script>
    <script src="js/screens/skills-screen.js?v=24"></script>
    <script src="js/screens/achievements-screen.js?v=24"></script>
    <script src="js/screens/map-screen.js?v=24"></script>
    <script src="js/screens/cutscene-screen.js?v=24"></script>
    <script src="js/screens/settings-screen.js?v=24"></script>
    <script src="js/screens/ending-screen.js?v=24"></script>
    <script src="js/screens/howtoplay-screen.js?v=24"></script>
    <script src="js/screens/journal-screen.js?v=24"></script>
    <script src="js/screens/loading-screen.js?v=24"></script>

    <!-- Bootstrap -->
    <script src="js/main.js?v=24"></script>
</body>
</html>
